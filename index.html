<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trading Log · GGAL/ABR26</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/prop-types@15/prop-types.min.js"></script>
<script src="https://unpkg.com/recharts@2.5.0/umd/Recharts.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #09090b; --surface: #111113; --border: #27272a; --border-hover: #3f3f46;
    --text: #e4e4e7; --muted: #71717a; --faint: #3f3f46; --indigo: #6366f1;
    --green: #4ade80; --green-bg: #052e16; --green-border: #166534;
    --red: #f87171; --red-bg: #450a0a; --red-border: #991b1b;
    --yellow: #fbbf24; --yellow-bg: #451a03;
  }
  html, body { background: var(--bg); color: var(--text); font-family: 'JetBrains Mono', monospace; min-height: 100vh; }
  #root { min-height: 100vh; }
  input, textarea, button { font-family: inherit; }
  input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }
  input:focus, textarea:focus { outline: none; }
  @keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
  .fi { animation: fadeIn 0.2s ease forwards; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useMemo, useEffect } = React;
const { AreaChart, Area, XAxis, YAxis, Tooltip, ResponsiveContainer, ReferenceLine } = Recharts;

const STORAGE_KEY = "trading_log_v1";
let _mem = null;
function storageGet() {
  try { const v = localStorage.getItem(STORAGE_KEY); if(v) return JSON.parse(v); } catch {}
  try { const v = sessionStorage.getItem(STORAGE_KEY); if(v) return JSON.parse(v); } catch {}
  return _mem;
}
function storageSet(data) {
  const s = JSON.stringify(data);
  try { localStorage.setItem(STORAGE_KEY, s); return; } catch {}
  try { sessionStorage.setItem(STORAGE_KEY, s); return; } catch {}
  _mem = data;
}

const FEB_REF = { id:"feb-2025", date:"2025-02", type:"monthly", pnl:1, note:"Mes rentable — sin detalle diario" };

function fmtFull(n) { return (n>=0?"+":"−")+"$"+Math.abs(n).toLocaleString("es-AR"); }
function fmtShort(n) {
  const a=Math.abs(n), s=n>=0?"+":"−";
  if(a>=1000000) return s+"$"+(a/1000000).toFixed(1)+"M";
  if(a>=1000) return s+"$"+(a/1000).toFixed(1)+"k";
  return s+"$"+a;
}

function calcMetrics(sessions) {
  const daily = sessions.filter(s=>s.type==="daily");
  if(!daily.length) return null;
  const sorted = [...daily].sort((a,b)=>a.date.localeCompare(b.date));
  const totalPnl = daily.reduce((a,s)=>a+s.pnl,0);
  const wins = daily.filter(s=>s.pnl>0).length;
  const losses = daily.filter(s=>s.pnl<=0).length;
  const wr = (wins/daily.length)*100;
  const grossWin = daily.reduce((a,s)=>a+(s.grossWin||0),0);
  const grossLoss = daily.reduce((a,s)=>a+(s.grossLoss||0),0);
  const pf = grossLoss>0 ? grossWin/grossLoss : null;
  const avgWin = wins>0 ? grossWin/wins : 0;
  const avgLoss = losses>0 ? grossLoss/losses : 0;
  const rrRatio = avgLoss>0 ? avgWin/avgLoss : null;
  let equity=0, peak=0, maxDD=0;
  const equityCurve = sorted.map(s=>{
    equity+=s.pnl; if(equity>peak) peak=equity;
    const dd=peak-equity; if(dd>maxDD) maxDD=dd;
    return { date:s.date.slice(5), equity, pnl:s.pnl };
  });
  const months={};
  daily.forEach(s=>{
    const mo=s.date.slice(0,7);
    if(!months[mo]) months[mo]={pnl:0,sessions:0,wins:0,ops:0};
    months[mo].pnl+=s.pnl; months[mo].sessions++;
    months[mo].wins+=s.pnl>0?1:0;
    months[mo].ops+=(s.opsWin||0)+(s.opsLoss||0);
  });
  const greenMonthsCount=1+Object.values(months).filter(m=>m.pnl>0).length;
  return { totalPnl, wins, losses, wr, pf, avgWin, avgLoss, rrRatio, maxDD, equityCurve, months, totalDays:daily.length, greenMonthsCount };
}

function getRules(pnl, ops) {
  const f=[];
  if(pnl<=-40000) f.push({type:"danger",msg:"⛔ Cierre total −$40k"});
  else if(pnl<=-20000) f.push({type:"warn",msg:"⚠️ Alerta −$20k"});
  if(pnl>=20000) f.push({type:"ok",msg:"✂️ Corte +$20k"});
  if(ops>=65) f.push({type:"ok",msg:"✂️ Corte 65 contratos"});
  return f;
}

const C = { card:{borderRadius:12,border:"1px solid var(--border)",background:"var(--surface)",padding:16}, lbl:{fontSize:10,textTransform:"uppercase",letterSpacing:"0.18em",color:"var(--muted)",marginBottom:6,display:"block"}, inp:{width:"100%",background:"#1c1c1e",border:"1px solid var(--border)",borderRadius:8,padding:"10px 12px",fontSize:13,color:"var(--text)",fontFamily:"inherit",transition:"border-color 0.15s"}, btn:{width:"100%",padding:"12px",borderRadius:10,border:"none",fontSize:13,fontWeight:700,letterSpacing:"0.1em",cursor:"pointer",fontFamily:"inherit",transition:"all 0.15s"}, g2:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12} };

function Chip({type,msg}) {
  const s={danger:{background:"var(--red-bg)",color:"var(--red)",border:"1px solid var(--red-border)"},warn:{background:"var(--yellow-bg)",color:"var(--yellow)",border:"1px solid #92400e"},ok:{background:"var(--green-bg)",color:"var(--green)",border:"1px solid var(--green-border)"}}[type];
  return <span style={{...s,fontSize:11,padding:"2px 8px",borderRadius:4}}>{msg}</span>;
}

function KPI({label,value,sub,color}) {
  return (
    <div style={{...C.card,position:"relative",overflow:"hidden"}}>
      <div style={{position:"absolute",top:0,left:0,right:0,height:1,background:`linear-gradient(90deg,transparent,${color},transparent)`}}/>
      <span style={C.lbl}>{label}</span>
      <div style={{fontSize:22,fontWeight:700,color,fontVariantNumeric:"tabular-nums"}}>{value}</div>
      {sub&&<div style={{fontSize:11,color:"var(--muted)",marginTop:2}}>{sub}</div>}
    </div>
  );
}

function CTip({active,payload,label}) {
  if(!active||!payload?.length) return null;
  const d=payload[0]?.payload;
  return <div style={{background:"var(--surface)",border:"1px solid var(--border)",borderRadius:8,padding:"8px 12px",fontSize:11}}><div style={{color:"var(--muted)",marginBottom:4}}>{label}</div><div style={{color:(d?.equity||0)>=0?"var(--green)":"var(--red)"}}>Equity: {fmtShort(d?.equity||0)}</div><div style={{color:"var(--muted)"}}>Sesión: {fmtShort(d?.pnl||0)}</div></div>;
}

function EquityCurve({data}) {
  if(!data?.length) return <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:130,color:"var(--faint)",fontSize:12}}>Sin datos aún — registrá tu primera sesión</div>;
  const color=(data[data.length-1]?.equity||0)>=0?"#4ade80":"#f87171";
  return (
    <ResponsiveContainer width="100%" height={130}>
      <AreaChart data={data} margin={{top:4,right:4,bottom:0,left:0}}>
        <defs><linearGradient id="eq" x1="0" y1="0" x2="0" y2="1"><stop offset="5%" stopColor={color} stopOpacity={0.2}/><stop offset="95%" stopColor={color} stopOpacity={0}/></linearGradient></defs>
        <ReferenceLine y={0} stroke="var(--border)" strokeDasharray="3 3"/>
        <XAxis dataKey="date" tick={{fontSize:9,fill:"var(--muted)",fontFamily:"monospace"}} axisLine={false} tickLine={false}/>
        <YAxis hide/>
        <Tooltip content={<CTip/>}/>
        <Area type="monotone" dataKey="equity" stroke={color} strokeWidth={2} fill="url(#eq)" dot={false}/>
      </AreaChart>
    </ResponsiveContainer>
  );
}

function MonthGrid({months,count}) {
  return (
    <div style={C.card}>
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:12}}><span style={C.lbl}>Meses en verde 2025</span><span style={{fontSize:13,fontWeight:700,color:"var(--indigo)"}}>{count} / 12</span></div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(12,1fr)",gap:4}}>
        {["E","F","M","A","M","J","J","A","S","O","N","D"].map((lbl,i)=>{
          const key=`2025-${String(i+1).padStart(2,"0")}`, d=months?.[key], isFeb=i===1;
          let bg="var(--border)",tc="var(--faint)";
          if(isFeb){bg="var(--green-bg)";tc="var(--green)";}
          else if(d){bg=d.pnl>0?"var(--green-bg)":"var(--red-bg)";tc=d.pnl>0?"var(--green)":"var(--red)";}
          return <div key={i} style={{background:bg,borderRadius:4,padding:"6px 0",textAlign:"center"}}><span style={{fontSize:10,fontWeight:700,color:tc}}>{lbl}</span></div>;
        })}
      </div>
    </div>
  );
}

function SessionCard({s,onDelete}) {
  const [hov,setHov]=useState(false);
  const isPos=s.pnl>=0, ops=(s.opsWin||0)+(s.opsLoss||0);
  const wr=ops>0?((s.opsWin/ops)*100).toFixed(0):null;
  const pf=s.grossLoss>0?(s.grossWin/s.grossLoss).toFixed(2):null;
  const rules=getRules(s.pnl,ops);
  return (
    <div style={{...C.card,borderColor:hov?"var(--border-hover)":"var(--border)",transition:"border-color 0.15s"}} onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)} className="fi">
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <span style={{fontSize:11,color:"var(--muted)"}}>{s.date}</span>
          <span style={{fontSize:16,fontWeight:700,color:isPos?"var(--green)":"var(--red)"}}>{fmtFull(s.pnl)}</span>
        </div>
        {hov&&<button onClick={()=>onDelete(s.id)} style={{background:"none",border:"none",color:"var(--faint)",cursor:"pointer",fontSize:12}} onMouseEnter={e=>e.target.style.color="var(--red)"} onMouseLeave={e=>e.target.style.color="var(--faint)"}>✕</button>}
      </div>
      <div style={{height:3,background:"var(--border)",borderRadius:2,overflow:"hidden",marginBottom:10,position:"relative"}}>
        <div style={{position:"absolute",top:0,left:"50%",width:1,height:"100%",background:"var(--faint)"}}/>
        <div style={{position:"absolute",top:0,height:"100%",borderRadius:2,background:isPos?"var(--green)":"var(--red)",left:isPos?"50%":`${Math.max(0,50-Math.min(49,Math.abs(s.pnl)/1000))}%`,width:`${Math.min(49,Math.abs(s.pnl)/1000)}%`}}/>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8,marginBottom:rules.length||s.obs?10:0}}>
        {[{l:"OPS",v:ops||"—",c:"var(--text)"},{l:"WR",v:wr?wr+"%":"—",c:wr>=65?"var(--green)":wr?"var(--yellow)":"var(--muted)"},{l:"PF",v:pf||"—",c:pf>=1.5?"var(--green)":pf>=1?"var(--yellow)":pf?"var(--red)":"var(--muted)"},{l:"DD",v:s.drawdown?fmtShort(-s.drawdown):"—",c:"var(--text)"}].map(c=>(
          <div key={c.l}><div style={{fontSize:10,color:"var(--muted)",marginBottom:2}}>{c.l}</div><div style={{fontSize:12,fontWeight:700,color:c.c}}>{c.v}</div></div>
        ))}
      </div>
      {rules.length>0&&<div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:s.obs?8:0}}>{rules.map((r,i)=><Chip key={i} {...r}/>)}</div>}
      {s.obs&&<p style={{fontSize:11,color:"var(--muted)",fontStyle:"italic",borderLeft:"2px solid var(--border)",paddingLeft:8,lineHeight:1.6,margin:0}}>{s.obs}</p>}
    </div>
  );
}

const emptyForm = {date:new Date().toISOString().split("T")[0],opsWin:"",opsLoss:"",grossWin:"",grossLoss:"",pnl:"",drawdown:"",obs:""};

function NewSession({onSave}) {
  const [f,setF]=useState(emptyForm), [saved,setSaved]=useState(false);
  const set=k=>e=>setF(p=>({...p,[k]:e.target.value}));
  const ops=(parseInt(f.opsWin)||0)+(parseInt(f.opsLoss)||0);
  const wr=ops>0?((parseInt(f.opsWin)/ops)*100).toFixed(1):null;
  const pf=parseFloat(f.grossLoss)>0?(parseFloat(f.grossWin)/parseFloat(f.grossLoss)).toFixed(2):null;
  const rules=getRules(parseFloat(f.pnl)||0,ops);
  const save=()=>{
    if(!f.date||!f.pnl) return;
    onSave({...f,id:Date.now(),type:"daily",pnl:parseFloat(f.pnl)||0,opsWin:parseInt(f.opsWin)||0,opsLoss:parseInt(f.opsLoss)||0,grossWin:parseFloat(f.grossWin)||0,grossLoss:parseFloat(f.grossLoss)||0,drawdown:parseFloat(f.drawdown)||0});
    setF({...emptyForm,date:new Date().toISOString().split("T")[0]});
    setSaved(true); setTimeout(()=>setSaved(false),2000);
  };
  const fi=e=>e.target.style.borderColor="var(--indigo)";
  const bl=e=>e.target.style.borderColor="var(--border)";
  const Field=({label,name,type="number",placeholder})=>(
    <div><label style={C.lbl}>{label}</label><input type={type} value={f[name]} onChange={set(name)} placeholder={placeholder} style={C.inp} onFocus={fi} onBlur={bl}/></div>
  );
  return (
    <div style={{...C.card,display:"flex",flexDirection:"column",gap:14}} className="fi">
      <span style={{...C.lbl,marginBottom:0}}>Nueva sesión · GGAL/ABR26</span>
      <Field label="📅 Fecha" name="date" type="date"/>
      <div style={C.g2}><Field label="✅ Ops ganadoras" name="opsWin" placeholder="0"/><Field label="❌ Ops perdedoras" name="opsLoss" placeholder="0"/></div>
      <div style={C.g2}><Field label="💹 Ganancia bruta $" name="grossWin" placeholder="0"/><Field label="💸 Pérdida bruta $" name="grossLoss" placeholder="0"/></div>
      <div style={C.g2}><Field label="💰 P&L neto $" name="pnl" placeholder="+ o −"/><Field label="📉 Drawdown máx $" name="drawdown" placeholder="0"/></div>
      <div><label style={C.lbl}>🧠 Observación</label><textarea value={f.obs} onChange={set("obs")} rows={3} placeholder="¿Respetaste el plan? ¿Qué pasó? ¿Qué aprendiste?" style={{...C.inp,resize:"none",lineHeight:1.6}} onFocus={fi} onBlur={bl}/></div>
      {(wr||pf||rules.length>0)&&(
        <div style={{background:"#1c1c1e",border:"1px solid var(--border)",borderRadius:8,padding:12}}>
          <span style={{...C.lbl,marginBottom:8}}>Preview</span>
          <div style={{display:"flex",gap:16,flexWrap:"wrap",marginBottom:rules.length?8:0}}>
            {wr&&<span style={{fontSize:13}}>WR <strong style={{color:parseFloat(wr)>=65?"var(--green)":"var(--yellow)"}}>{wr}%</strong></span>}
            {pf&&<span style={{fontSize:13}}>PF <strong style={{color:parseFloat(pf)>=1.5?"var(--green)":parseFloat(pf)>=1?"var(--yellow)":"var(--red)"}}>{pf}</strong></span>}
          </div>
          {rules.length>0&&<div style={{display:"flex",flexWrap:"wrap",gap:6}}>{rules.map((r,i)=><Chip key={i} {...r}/>)}</div>}
        </div>
      )}
      <button onClick={save} style={{...C.btn,background:saved?"var(--green-bg)":"var(--indigo)",color:saved?"var(--green)":"white"}}>
        {saved?"✓ SESIÓN REGISTRADA":"REGISTRAR SESIÓN"}
      </button>
    </div>
  );
}

function MonthlyView({sessions}) {
  const daily=sessions.filter(s=>s.type==="daily"), months={};
  daily.forEach(s=>{
    const m=s.date.slice(0,7);
    if(!months[m]) months[m]={pnl:0,sessions:0,wins:0,ops:0};
    months[m].pnl+=s.pnl; months[m].sessions++; months[m].wins+=s.pnl>0?1:0;
    months[m].ops+=(s.opsWin||0)+(s.opsLoss||0);
  });
  const greenCount=1+Object.values(months).filter(m=>m.pnl>0).length;
  return (
    <div style={{display:"flex",flexDirection:"column",gap:12}} className="fi">
      <div style={C.card}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:12}}><span style={C.lbl}>Objetivo anual 2025</span><span style={{fontSize:13,fontWeight:700,color:"var(--indigo)"}}>{greenCount} / 12 meses</span></div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(12,1fr)",gap:4}}>
          {["E","F","M","A","M","J","J","A","S","O","N","D"].map((lbl,i)=>{
            const key=`2025-${String(i+1).padStart(2,"0")}`, d=months[key], isFeb=i===1;
            let bg="var(--border)",tc="var(--faint)";
            if(isFeb){bg="var(--green-bg)";tc="var(--green)";}
            else if(d){bg=d.pnl>0?"var(--green-bg)":"var(--red-bg)";tc=d.pnl>0?"var(--green)":"var(--red)";}
            return <div key={i} style={{background:bg,borderRadius:4,padding:"7px 0",textAlign:"center"}}><span style={{fontSize:10,fontWeight:700,color:tc}}>{lbl}</span></div>;
          })}
        </div>
      </div>
      <div style={{...C.card,borderColor:"var(--green-border)",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <span style={{fontSize:13,color:"var(--text)"}}>Febrero 2025</span>
        <div style={{display:"flex",alignItems:"center",gap:8}}><Chip type="ok" msg="Mes verde"/><span style={{fontSize:11,color:"var(--muted)"}}>Sin detalle diario</span></div>
      </div>
      {Object.entries(months).sort((a,b)=>b[0].localeCompare(a[0])).map(([m,d])=>(
        <div key={m} style={C.card}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}><span style={{fontSize:13,color:"var(--text)"}}>{m}</span><span style={{fontSize:14,fontWeight:700,color:d.pnl>=0?"var(--green)":"var(--red)"}}>{fmtFull(d.pnl)}</span></div>
          <div style={{display:"flex",gap:16,fontSize:11,color:"var(--muted)"}}><span>{d.sessions} sesiones</span><span>WR {((d.wins/d.sessions)*100).toFixed(0)}%</span><span>{d.ops} contratos</span></div>
        </div>
      ))}
      {!Object.keys(months).length&&<div style={{textAlign:"center",padding:"40px 0",color:"var(--faint)",fontSize:12}}>Sin sesiones diarias registradas aún.</div>}
    </div>
  );
}

function App() {
  const [sessions,setSessions]=useState(()=>storageGet()||[FEB_REF]);
  const [view,setView]=useState("dashboard");
  useEffect(()=>{ storageSet(sessions); },[sessions]);
  const addSession=s=>setSessions(p=>[s,...p]);
  const deleteSession=id=>{ if(id==="feb-2025") return; setSessions(p=>p.filter(s=>s.id!==id)); };
  const m=useMemo(()=>calcMetrics(sessions),[sessions]);
  const daily=sessions.filter(s=>s.type==="daily").sort((a,b)=>b.date.localeCompare(a.date));
  const TABS=[{id:"dashboard",label:"Dashboard"},{id:"nueva",label:"Nueva"},{id:"sesiones",label:"Sesiones"},{id:"mensual",label:"Mensual"}];

  return (
    <div style={{minHeight:"100vh",background:"var(--bg)"}}>
      <header style={{borderBottom:"1px solid var(--border)",padding:"12px 20px",display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,background:"rgba(9,9,11,0.97)",backdropFilter:"blur(12px)",zIndex:20}}>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <div style={{width:4,height:24,borderRadius:2,background:"var(--indigo)"}}/>
          <div><div style={{fontSize:12,fontWeight:700,letterSpacing:"0.12em",textTransform:"uppercase"}}>Trading Log</div><div style={{fontSize:10,color:"var(--muted)"}}>GGAL/ABR26 · 2025</div></div>
        </div>
        <nav style={{display:"flex",gap:4}}>
          {TABS.map(t=><button key={t.id} onClick={()=>setView(t.id)} style={{padding:"6px 10px",borderRadius:8,border:"none",fontSize:10,fontFamily:"monospace",textTransform:"uppercase",letterSpacing:"0.1em",cursor:"pointer",transition:"all 0.15s",background:view===t.id?"var(--indigo)":"transparent",color:view===t.id?"white":"var(--muted)"}}>{t.label}</button>)}
        </nav>
      </header>

      <main style={{maxWidth:560,margin:"0 auto",padding:"24px 16px",display:"flex",flexDirection:"column",gap:16}}>
        {view==="dashboard"&&(
          <div style={{display:"flex",flexDirection:"column",gap:16}} className="fi">
            <div style={C.g2}>
              <KPI label="P&L Acumulado" value={m?fmtFull(m.totalPnl):"—"} sub={m?`${m.totalDays} sesiones`:"Sin datos"} color={m?.totalPnl>=0?"var(--green)":"var(--red)"}/>
              <KPI label="Win Rate" value={m?`${m.wr.toFixed(1)}%`:"—"} sub={m?`${m.wins}W · ${m.losses}L`:"Objetivo ≥65%"} color={!m?"var(--muted)":m.wr>=65?"var(--green)":"var(--yellow)"}/>
              <KPI label="Profit Factor" value={m?.pf?m.pf.toFixed(2):"—"} sub="Objetivo > 1.5" color={!m?.pf?"var(--muted)":m.pf>=1.5?"var(--green)":m.pf>=1?"var(--yellow)":"var(--red)"}/>
              <KPI label="Max Drawdown" value={m?fmtShort(-m.maxDD):"—"} sub="Desde pico de equity" color="var(--indigo)"/>
            </div>
            {m?.rrRatio&&(
              <div style={C.card}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}><span style={C.lbl}>Ratio R/R promedio</span><span style={{fontSize:14,fontWeight:700,color:m.rrRatio>=1.5?"var(--green)":m.rrRatio>=1?"var(--yellow)":"var(--red)"}}>{m.rrRatio.toFixed(2)} : 1</span></div>
                <div style={{display:"flex",gap:16,fontSize:11,color:"var(--muted)"}}>
                  <span>Avg win <span style={{color:"var(--green)"}}>{fmtShort(m.avgWin)}</span></span>
                  <span>Avg loss <span style={{color:"var(--red)"}}>{fmtShort(-m.avgLoss)}</span></span>
                </div>
              </div>
            )}
            <div style={C.card}><span style={C.lbl}>Curva de equity</span><EquityCurve data={m?.equityCurve}/></div>
            <MonthGrid months={m?.months} count={m?.greenMonthsCount||1}/>
            <div style={C.card}>
              <span style={C.lbl}>Reglas · No negociables</span>
              <div style={{display:"flex",flexDirection:"column",gap:8}}>
                {[{k:"Alerta",v:"−$20.000",c:"var(--yellow)"},{k:"Cierre total",v:"−$40.000",c:"var(--red)"},{k:"Corte anticipado",v:"65 contratos / +$20.000",c:"var(--green)"},{k:"Horario",v:"10:30 → 13:00",c:"var(--indigo)"},{k:"Objetivo diario",v:"+$10.000",c:"var(--green)"}].map(r=>(
                  <div key={r.k} style={{display:"flex",justifyContent:"space-between"}}><span style={{fontSize:12,color:"var(--muted)"}}>{r.k}</span><span style={{fontSize:12,fontWeight:700,color:r.c}}>{r.v}</span></div>
                ))}
              </div>
            </div>
          </div>
        )}
        {view==="nueva"&&<NewSession onSave={addSession}/>}
        {view==="sesiones"&&(
          <div style={{display:"flex",flexDirection:"column",gap:10}} className="fi">
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <span style={{...C.lbl,marginBottom:0}}>{daily.length} sesiones registradas</span>
              {m&&<span style={{fontSize:13,fontWeight:700,color:m.totalPnl>=0?"var(--green)":"var(--red)"}}>{fmtFull(m.totalPnl)}</span>}
            </div>
            {daily.length===0&&(
              <div style={{textAlign:"center",padding:"48px 0"}}>
                <div style={{fontSize:32,marginBottom:8}}>◈</div>
                <p style={{fontSize:12,color:"var(--muted)",marginBottom:16}}>Sin sesiones diarias aún.</p>
                <button onClick={()=>setView("nueva")} style={{...C.btn,width:"auto",padding:"8px 20px",background:"var(--indigo)",color:"white"}}>Cargar primera sesión →</button>
              </div>
            )}
            {daily.map(s=><SessionCard key={s.id} s={s} onDelete={deleteSession}/>)}
          </div>
        )}
        {view==="mensual"&&<MonthlyView sessions={sessions}/>}
      </main>
    </div>
  );
}

ReactDOM.render(<App/>, document.getElementById("root"));
</script>
</body>
</html>
